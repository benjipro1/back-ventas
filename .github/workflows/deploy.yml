name: CI/CD Backend Ventas

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build con Maven (sin tests)
        run: mvn clean package -DskipTests -B

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:${{ github.sha }}

      - name: Deploy en EC2 Data
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_DATA_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USERNAME }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app/ventas
            echo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} > .env
            echo DB_NAME=${{ secrets.DB_VENTAS_NAME }} >> .env
            echo DB_USERNAME=${{ secrets.DB_VENTAS_USERNAME }} >> .env
            echo DB_PASSWORD=${{ secrets.DB_VENTAS_PASSWORD }} >> .env
            echo MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_VENTAS_ROOT_PASSWORD }} >> .env
            docker compose pull backend-ventas
            docker compose up -d --force-recreate backend-ventas
            docker image prune -f
